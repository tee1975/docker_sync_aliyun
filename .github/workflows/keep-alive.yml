name: Keep Alive
on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

jobs:
  empty-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create empty commit
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git commit --allow-empty -m "chore: keep alive"
          git push
